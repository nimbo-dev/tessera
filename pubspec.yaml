name: tessera_app
description: Fichaje automático en Séneca para el profesorado de Andalucía.

publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # Almacenamiento seguro (token 2FA)
  flutter_secure_storage: ^9.0.0

  # Preferencias simples (configuración)
  shared_preferences: ^2.2.3

  # Tareas en background (fichaje automático)
  workmanager: ^0.9.0

  # Alarmas exactas (fichaje puntual)
  android_alarm_manager_plus: ^5.0.0

  # Notificaciones locales
  flutter_local_notifications: ^17.2.2

  # Iconos
  cupertino_icons: ^1.0.6

  # Animaciones
  flutter_animate: ^4.5.0

  # Formateo de fechas
  intl: ^0.19.0

  # Actualizaciones in-app (GitHub Releases)
  package_info_plus: ^8.1.0   # versión instalada
  path_provider: ^2.1.4       # carpeta para descargar el APK
  open_filex: ^4.5.0          # lanza el instalador del APK

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Genera los iconos de launcher en todas las densidades
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# Configuración del icono de la app (se genera con: dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
