# Verifica que el proyecto analiza y compila en cada push y PR a main.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable

      - name: Instalar dependencias
        run: flutter pub get

      - name: Analizar
        run: flutter analyze

      - name: Compilar (debug)
        run: flutter build apk --debug
