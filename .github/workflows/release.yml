# Compila el APK firmado y lo publica como GitHub Release.
#
# Se dispara al hacer push de un tag con formato vX.Y.Z (p. ej. v1.0.0).
# Compila en un entorno limpio de GitHub (sin rutas personales en el binario).
#
# ── Secrets que debes configurar en el repo (Settings → Secrets → Actions) ──
#   KEYSTORE_BASE64  → el .jks en base64:  base64 -i tessera-release.jks | pbcopy
#   STORE_PASSWORD   → contraseña del keystore
#   KEY_PASSWORD     → contraseña de la clave
#   KEY_ALIAS        → alias de la clave (p. ej. tessera)

name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable

      - name: Restaurar keystore desde el secret
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/tessera-release.jks"

      - name: Crear key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=$RUNNER_TEMP/tessera-release.jks
          EOF

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar APK firmado
        run: flutter build apk --release

      - name: Publicar la release con el APK
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
